name: Example - Deploy Course to qBraid

# This is an example showing how to use the reusable workflow
# in your course repository

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-course:
    # Use the reusable workflow from this action repository
    uses: courseBuilderNelson/UploadActionRepo/.github/workflows/deploy-course.yml@v1
    with:
      # Optional: specify path to course.json if not in root
      # course-json-path: 'config/course.json'
      course-json-path: 'course.json'
    secrets:
      # Your qBraid API key must be set as a repository secret
      QBRAID_API_KEY: ${{ secrets.QBRAID_API_KEY }}
