# Example workflow for testing the action BEFORE it's published to marketplace
# Copy this to your test repository as .github/workflows/deploy.yml

name: Deploy Course to qBraid

on:
  workflow_dispatch:  # Allows manual triggering for testing
  push:
    branches: [ main, test ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to qBraid
        id: deploy
        # Reference the action from source repository (not marketplace)
        # Options:
        #   @main - uses the main branch (good for testing latest changes)
        #   @abc123def456 - uses a specific commit SHA (most stable)
        #   @v0.1.0 - uses a specific tag (recommended for production)
        uses: qBraid/upload-course-api@v0.1.0
        with:
          # Required: Your qBraid API Key (stored in repository secrets)
          api-key: ${{ secrets.QBRAID_API_KEY }}
          
          # Required: GitHub token with read access to the repository
          repo-read-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Optional: Path to your course.json file (defaults to 'course.json')
          course-json-path: 'course.json'
          
          # Optional: Type of article to create (course or blog, defaults to 'course')
          article-type: 'course'
          
          # Optional: Whether to force upload duplicate questions (defaults to 'false')
          force-duplicate-questions: 'false'

      - name: Show Results
        if: success()
        run: |
          echo "✅ Course deployed successfully!"
          echo "Course Name: ${{ steps.deploy.outputs.course_name }}"
          echo "Course URL: ${{ steps.deploy.outputs.qbook_url }}"
