# Example workflow for deploying a course to qBraid
# Copy this to your repository as .github/workflows/deploy.yml

name: Deploy Course to qBraid

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode (create/update)'
        required: true
        default: 'create'
        type: choice
        options:
        - create
        - update
      course_id:
        description: 'Course ID (required for update)'
        required: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to qBraid
        id: deploy
        uses: qBraid/upload-course-action@v0.1.0-beta
        with:
          # Required: Your qBraid API Key (stored in repository secrets)
          api-key: ${{ secrets.QBRAID_API_KEY }}
          
          # Required: GitHub token with read access to the repository
          repo-read-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Optional: Path to your course.json file (defaults to 'course.json')
          course-json-path: 'course.json'

          # Optional: Type of article to create (course or blog, defaults to 'course')
          article-type: 'course'
          
          # Optional: Whether to force upload duplicate questions (defaults to 'false')
          force-duplicate-questions: 'false'

          # Optional: Enable certificates for this course (defaults to 'false')
          certificate-enabled: 'false'

          # Optional: Certificate criteria type - 'completion' or 'points' (defaults to 'completion')
          certificate-criteria-type: 'completion'

          # Optional: Certificate criteria value (0-100 for completion, any number for points)
          certificate-criteria-value: '100'

          # Optional: Operation mode ('create' or 'update', defaults to 'create')
          # Can be dynamic based on workflow inputs or variables
          mode: ${{ inputs.mode || 'create' }}

          # Optional: Custom ID of the course (Required if mode is 'update')
          course-custom-id: ${{ inputs.course_id }}

      - name: Show deployment results
        if: success()
        run: |
          echo "✅ Course deployed successfully!"
          echo "Course Name: ${{ steps.deploy.outputs.course_name }}"
          echo "Custom ID: ${{ steps.deploy.outputs.course_custom_id }}"
          echo "Course URL: ${{ steps.deploy.outputs.qbook_url }}"
