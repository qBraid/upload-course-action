name: Deploy Course to qBraid

on:
  workflow_call:
    inputs:
      course-json-path:
        description: 'Path to course.json file'
        required: false
        type: string
        default: 'course.json'
    secrets:
      QBRAID_API_KEY:
        description: 'qBraid API key for authentication'
        required: true

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install nbformat requests

      - name: Stage 1 - Validate course.json structure
        id: validate-course
        run: |
          python3 << 'EOF'
          import json
          import sys
          import os
          
          # Read course.json
          course_file = '${{ inputs.course-json-path }}'
          
          if not os.path.exists(course_file):
              print(f"ERROR: {course_file} not found in repository root")
              sys.exit(1)
          
          with open(course_file, 'r') as f:
              course_data = json.load(f)
          
          # Validate structure
          required_fields = ['owner_email', 'course_name', 'content']
          for field in required_fields:
              if field not in course_data:
                  print(f"ERROR: Missing required field: {field}")
                  sys.exit(1)
          
          # Validate content structure
          if not isinstance(course_data['content'], list):
              print("ERROR: 'content' must be a list of chapters")
              sys.exit(1)
          
          for idx, chapter in enumerate(course_data['content']):
              if 'kernel_name' not in chapter:
                  print(f"ERROR: Chapter {idx} missing 'kernel_name'")
                  sys.exit(1)
              if 'chapter_name' not in chapter:
                  print(f"ERROR: Chapter {idx} missing 'chapter_name'")
                  sys.exit(1)
              if 'file_path' not in chapter:
                  print(f"ERROR: Chapter {idx} missing 'file_path'")
                  sys.exit(1)
              
              # Check for sections if present
              if 'sections' in chapter:
                  if not isinstance(chapter['sections'], list):
                      print(f"ERROR: Chapter {idx} 'sections' must be a list")
                      sys.exit(1)
                  for section_idx, section in enumerate(chapter['sections']):
                      if 'section_obj' not in section:
                          print(f"ERROR: Chapter {idx}, Section {section_idx} missing 'section_obj'")
                          sys.exit(1)
                      if 'section_name' not in section:
                          print(f"ERROR: Chapter {idx}, Section {section_idx} missing 'section_name'")
                          sys.exit(1)
                      if 'file_path' not in section:
                          print(f"ERROR: Chapter {idx}, Section {section_idx} missing 'file_path'")
                          sys.exit(1)
          
          print("✅ course.json structure is valid")
          
          # Save course data for next steps
          with open('course_data.json', 'w') as f:
              json.dump(course_data, f)
          
          # Format course name for GCS
          course_name = course_data['course_name']
          formatted_name = course_name.replace(' ', '_').replace('/', '-').replace('\\', '-')
          # Remove special characters except _ and -
          import re
          formatted_name = re.sub(r'[^a-zA-Z0-9_-]', '', formatted_name)
          
          print(f"formatted_course_name={formatted_name}")
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"formatted_course_name={formatted_name}\n")
          EOF

      - name: Stage 2 - Verify all notebooks exist
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          
          with open('course_data.json', 'r') as f:
              course_data = json.load(f)
          
          missing_files = []
          
          for chapter in course_data['content']:
              file_path = chapter['file_path']
              if not os.path.exists(file_path):
                  missing_files.append(f"Chapter: {file_path}")
              
              if 'sections' in chapter:
                  for section in chapter['sections']:
                      section_path = section['file_path']
                      if not os.path.exists(section_path):
                          missing_files.append(f"Section: {section_path}")
          
          if missing_files:
              print("ERROR: The following notebook files are missing:")
              for file in missing_files:
                  print(f"  - {file}")
              sys.exit(1)
          
          print("✅ All notebook files exist at specified paths")
          EOF

      - name: Stage 3 - Verify all image references in notebooks
        run: |
          python3 << 'EOF'
          import json
          import os
          import sys
          import nbformat
          import re
          
          with open('course_data.json', 'r') as f:
              course_data = json.load(f)
          
          missing_images = []
          
          def check_notebook_images(notebook_path):
              """Check all image references in a notebook"""
              notebook_dir = os.path.dirname(notebook_path)
              
              with open(notebook_path, 'r', encoding='utf-8') as f:
                  nb = nbformat.read(f, as_version=4)
              
              images_to_check = []
              
              for cell in nb.cells:
                  if cell.cell_type == 'markdown':
                      # Find markdown image references: ![alt](path)
                      md_images = re.findall(r'!\[.*?\]\((.*?)\)', cell.source)
                      images_to_check.extend(md_images)
                      
                      # Find HTML img tags: <img src="path">
                      html_images = re.findall(r'<img[^>]+src=["\']([^"\']+)["\']', cell.source)
                      images_to_check.extend(html_images)
              
              for img_ref in images_to_check:
                  # Skip URLs
                  if img_ref.startswith('http://') or img_ref.startswith('https://'):
                      continue
                  
                  # Check absolute path from repo root
                  if img_ref.startswith('/'):
                      abs_path = img_ref[1:]  # Remove leading /
                      if not os.path.exists(abs_path):
                          missing_images.append({
                              'notebook': notebook_path,
                              'image': img_ref,
                              'type': 'absolute'
                          })
                  else:
                      # Check relative path from notebook directory
                      rel_path = os.path.join(notebook_dir, img_ref)
                      if not os.path.exists(rel_path):
                          missing_images.append({
                              'notebook': notebook_path,
                              'image': img_ref,
                              'type': 'relative'
                          })
          
          # Check all notebooks
          for chapter in course_data['content']:
              file_path = chapter['file_path']
              check_notebook_images(file_path)
              
              if 'sections' in chapter:
                  for section in chapter['sections']:
                      section_path = section['file_path']
                      check_notebook_images(section_path)
          
          if missing_images:
              print("ERROR: The following image references are missing:")
              for item in missing_images:
                  print(f"  Notebook: {item['notebook']}")
                  print(f"    Missing {item['type']} path: {item['image']}")
              sys.exit(1)
          
          print("✅ All image references in notebooks are valid")
          EOF

      - name: Stage 4 - Upload files to GCS
        uses: ./
        with:
          api-key: ${{ secrets.QBRAID_API_KEY }}
          destination-path: ${{ steps.validate-course.outputs.formatted_course_name }}

      - name: Stage 5 - Create course via qBraid API
        id: create-course
        run: |
          python3 << 'EOF'
          import json
          import requests
          import sys
          import os
          
          with open('course_data.json', 'r') as f:
              course_data = json.load(f)
          
          api_key = '${{ secrets.QBRAID_API_KEY }}'
          
          # Call qBraid API to create course
          response = requests.post(
              'http://api.qbraid.com/learn/create',
              json={'data': course_data},
              headers={'Authorization': f'Bearer {api_key}'}
          )
          
          if response.status_code != 201:
              print(f"ERROR: Failed to create course. Status: {response.status_code}")
              print(f"Response: {response.text}")
              sys.exit(1)
          
          print("✅ Course created successfully via qBraid API")
          
          # Extract course ID or other info if needed
          response_data = response.json()
          print(f"API Response: {json.dumps(response_data, indent=2)}")
          EOF

      - name: Stage 6 - Poll worker service for completion
        id: poll-worker
        run: |
          python3 << 'EOF'
          import requests
          import time
          import sys
          import os
          
          worker_url = 'http://api-worker.qbraid.com'
          api_key = '${{ secrets.QBRAID_API_KEY }}'
          formatted_name = '${{ steps.validate-course.outputs.formatted_course_name }}'
          
          max_attempts = 60  # Poll for up to 30 minutes (60 * 30 seconds)
          attempt = 0
          
          print(f"Polling worker service at {worker_url}...")
          
          while attempt < max_attempts:
              attempt += 1
              
              try:
                  response = requests.get(
                      f'{worker_url}/status/{formatted_name}',
                      headers={'Authorization': f'Bearer {api_key}'}
                  )
                  
                  if response.status_code == 200:
                      data = response.json()
                      if 'qbookUrl' in data:
                          qbook_url = data['qbookUrl']
                          print(f"✅ Course processing complete!")
                          print(f"qBook URL: {qbook_url}")
                          
                          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                              f.write(f"qbook_url={qbook_url}\n")
                          
                          sys.exit(0)
                  
                  print(f"Attempt {attempt}/{max_attempts}: Still processing...")
                  time.sleep(30)  # Wait 30 seconds between polls
                  
              except Exception as e:
                  print(f"Error polling worker: {e}")
                  time.sleep(30)
          
          print("ERROR: Worker service did not complete within the timeout period")
          sys.exit(1)
          EOF

      - name: Create deployment summary
        if: success()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🎉 Course Deployment Successful
          
          Your course has been successfully deployed to qBraid!
          
          **Course Name:** ${{ steps.validate-course.outputs.formatted_course_name }}
          **qBook URL:** ${{ steps.poll-worker.outputs.qbook_url }}
          
          ## Next Steps
          
          You can now access your course at the qBook URL above.
          
          EOF

      - name: Send notification comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎓 **Course Deployment Complete!**\n\nYour course is now live on qBraid.\n\n**View your course:** ${{ steps.poll-worker.outputs.qbook_url }}\n\nCourse name: \`${{ steps.validate-course.outputs.formatted_course_name }}\``
            })
