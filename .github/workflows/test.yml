name: Tests

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # Will update when API is ready

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run unit tests
        run: uv run pytest -q test/unit --no-cov

      - name: Run integration tests
        run: uv run pytest -q test/e2e --no-cov

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@5e5e22e0e5fbbf50e2e05855b6650b2b45f0b0a2  # v4.4.3
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
          retention-days: 7

  workflow-checks:
    name: Workflow & Action Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s
          sudo mv actionlint /usr/local/bin/
      
      - name: Run actionlint
        run: actionlint

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@v0.1.2
        with:
          advanced-security: false

  e2e-action-test:
    name: E2E Action Test
    runs-on: ubuntu-latest
    needs: [unit-tests, workflow-checks]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create test course.json
        run: |
          mkdir -p test-e2e
          cat > test-e2e/course.json << 'EOF'
          {
            "courseName": "E2E Test Course",
            "courseDescription": "Test Description",
            "visibility": "public",
            "imageLink": {"darkLogo": "logo.png", "lightLogo": "logo.png"},
            "tags": ["test"],
            "deployedTo": ["qbraid.com"],
            "content": []
          }
          EOF

      - name: Test action with valid inputs
        id: test-valid
        uses: ./
        with:
          api-key: ${{ secrets.QBRAID_API_KEY }}
          repo-read-token: ${{ secrets.GITHUB_TOKEN }}
          course-json-path: test-e2e/course.json
          article-type: course
        continue-on-error: true

      - name: Assert action outputs
        if: steps.test-valid.outcome == 'success'
        run: |
          if [ -z "${{ steps.test-valid.outputs.course_name }}" ]; then
            echo "::error::course_name output not set"
            exit 1
          fi

      - name: Test action with spaces in path
        id: test-spaces
        uses: ./
        with:
          api-key: ${{ secrets.QBRAID_API_KEY }}
          repo-read-token: ${{ secrets.GITHUB_TOKEN }}
          course-json-path: "test-e2e/course.json"
          article-type: "course"
        continue-on-error: true

      - name: Test action with missing file
        id: test-missing
        uses: ./
        with:
          api-key: ${{ secrets.QBRAID_API_KEY }}
          repo-read-token: ${{ secrets.GITHUB_TOKEN }}
          course-json-path: "nonexistent.json"
          article-type: course
        continue-on-error: true

      - name: Verify error handling
        if: steps.test-missing.outcome == 'success'
        run: |
          echo "::error::Action should fail on missing file"
          exit 1
