name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8f4b7f8486ec3f3d81099d10020348a54c5f8f84  # v4.1.1

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@d27e3f3d73cc34e47688a7a2c596e4079f9dd8e1  # v5.1.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv pip install -e ".[test]"

      - name: Run unit tests
        run: |
          pytest -q test/unit

      - name: Run integration tests
        run: |
          pytest -q test/e2e

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@5e5e22e0e5fbbf50e2e05855b6650b2b45f0b0a2  # v4.4.3
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
          retention-days: 7

  workflow-checks:
    name: Workflow & Action Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8f4b7f8486ec3f3d81099d10020348a54c5f8f84  # v4.1.1

      - name: Run actionlint
        uses: reviewdog/action-actionlint@a3c7c273e67c8fd06c78f23c7c0e658f3b3c9e11  # v1.6.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check
          fail_on_error: true

      - name: Run zizmor
        uses: zizmor/zizmor-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: true

  e2e-action-test:
    name: E2E Action Test
    runs-on: ubuntu-latest
    needs: [unit-tests, workflow-checks]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test course.json
        run: |
          mkdir -p test-e2e
          cat > test-e2e/course.json << 'EOF'
          {
            "courseName": "E2E Test Course",
            "courseDescription": "Test Description",
            "visibility": "public",
            "imageLink": {"darkLogo": "logo.png", "lightLogo": "logo.png"},
            "tags": ["test"],
            "deployedTo": ["qbraid.com"],
            "content": []
          }
          EOF

      - name: Test action with valid inputs
        id: test-valid
        uses: ./
        with:
          api-key: ${{ secrets.QBRAID_API_KEY || 'test-key' }}
          repo-read-token: ${{ secrets.GITHUB_TOKEN }}
          course-json-path: test-e2e/course.json
          article-type: course
        continue-on-error: true

      - name: Assert action outputs
        if: steps.test-valid.outcome == 'success'
        run: |
          if [ -z "${{ steps.test-valid.outputs.course_name }}" ]; then
            echo "::error::course_name output not set"
            exit 1
          fi

      - name: Test action with spaces in path
        id: test-spaces
        uses: ./
        with:
          api-key: ${{ secrets.QBRAID_API_KEY || 'test-key' }}
          repo-read-token: ${{ secrets.GITHUB_TOKEN }}
          course-json-path: "test-e2e/course.json"
          article-type: "course"
        continue-on-error: true

      - name: Test action with missing file
        id: test-missing
        uses: ./
        with:
          api-key: ${{ secrets.QBRAID_API_KEY || 'test-key' }}
          repo-read-token: ${{ secrets.GITHUB_TOKEN }}
          course-json-path: "nonexistent.json"
          article-type: course
        continue-on-error: true

      - name: Verify error handling
        if: steps.test-missing.outcome == 'success'
        run: |
          echo "::error::Action should fail on missing file"
          exit 1
