name: 'Deploy Course to qBraid'
description: 'Validate, upload, and deploy a course to qBraid platform'
author: 'qBraid'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  course-json-path:
    description: 'Path to course.json file'
    required: false
    default: 'course.json'
  api-key:
    description: 'qBraid API key for authentication'
    required: true
  source-path:
    description: 'Path to the directory or file to upload (relative to repository root)'
    required: false
    default: '.'
  exclude-patterns:
    description: 'Comma-separated list of glob patterns to exclude from upload'
    required: false
    default: '.git/**,node_modules/**,.github/**'

outputs:
  formatted_course_name:
    description: 'Formatted course name used for GCS storage'
    value: ${{ steps.validate-course.outputs.formatted_course_name }}
  qbook_url:
    description: 'URL of the deployed course'
    value: ${{ steps.poll-worker.outputs.qbook_url }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/requirements.txt

    - name: Stage 0 - Validate API Key
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/validate_api_key.py '${{ inputs.api-key }}'

    - name: Stage 1 - Validate course.json structure
      id: validate-course
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/validate_course.py "${{ inputs.course-json-path }}"

    - name: Stage 2 - Verify all notebooks exist
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/verify_notebooks.py

    - name: Stage 3 - Verify all image references in notebooks
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/check_images.py

    - name: Stage 4 - Upload files to GCS
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/upload_files.py '${{ inputs.api-key }}' '${{ inputs.source-path }}' '${{ inputs.exclude-patterns }}' '${{ steps.validate-course.outputs.formatted_course_name }}'

    - name: Stage 5 - Create course via qBraid API
      id: create-course
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/create_course.py '${{ inputs.api-key }}'

    - name: Stage 6 - Poll worker service for completion
      id: poll-worker
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/poll_worker.py '${{ inputs.api-key }}' '${{ steps.validate-course.outputs.formatted_course_name }}'

    - name: Create deployment summary
      if: success()
      shell: bash
      run: |
        cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        # 🎉 Course Deployment Successful
        
        Your course has been successfully deployed to qBraid!
        
        **Course Name:** ${{ steps.validate-course.outputs.formatted_course_name }}
        **qBook URL:** ${{ steps.poll-worker.outputs.qbook_url }}
        
        ## Next Steps
        
        You can now access your course at the qBook URL above.
        
        EOF

    - name: Send notification comment
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `🎓 **Course Deployment Complete!**\n\nYour course is now live on qBraid.\n\n**View your course:** ${{ steps.poll-worker.outputs.qbook_url }}\n\nCourse name: \`${{ steps.validate-course.outputs.formatted_course_name }}\``
          })
