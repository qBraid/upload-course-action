name: 'Deploy Course to qBraid'
description: 'Validate, upload, and deploy a course to qBraid platform'
author: 'qBraid'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  course-json-path:
    description: 'Path to course.json file'
    required: false
    default: 'course.json'
  api-key:
    description: 'qBraid API key for authentication'
    required: true
  repo-read-token:
    description: 'GitHub token with read access to the repository'
    required: true
  article-type:
    description: 'Type of article to create (course or blog)'
    required: false
    default: 'course'
  force-duplicate-questions:
    description: 'Whether to force upload duplicate questions (true or false)'
    required: false
    default: 'false'

outputs:
  course_name:
    description: 'Name of the deployed course'
    value: ${{ steps.validate-course.outputs.course_name }}
  course-custom-id:
    description: 'Custom ID of the deployed course'
    value: ${{ steps.create-course.outputs.course_custom_id }}
  qbook_url:
    description: 'URL of the deployed course'
    value: ${{ steps.poll-status.outputs.qbook_url }}


runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/requirements.txt

    - name: Validate Repo Read Github Token
      shell: bash
      run: |
        if [[ -z "${{ inputs.repo-read-token }}" ]]; then
          echo "::error::repo-read-token is empty. Please ensure it is set in the secrets."
          exit 1
        fi

    - name: Stage 0 - Validate API Key
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/validate_api_key.py '${{ inputs.api-key }}'

    - name: Stage 1 - Validate course.json structure
      id: validate-course
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/validate_course.py "${{ inputs.course-json-path }}"

    - name: Stage 2 - Verify all notebooks exist
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/verify_notebooks.py

    - name: Stage 3 - Verify all image references in notebooks
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/check_images.py

    - name: Stage 5 - Create course via qBraid API
      id: create-course
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/create_course.py '${{ inputs.api-key }}' '${{ inputs.article-type }}' '${{ inputs.force-duplicate-questions }}' '${{ inputs.repo-read-token }}' '${{ github.server_url }}/${{ github.repository }}' '${{ github.sha }}'

    - name: Stage 6 - Poll status end point for completion
      id: poll-status
      shell: bash
      run: |
        python ${{ github.action_path }}/src/scripts/poll_files_progress.py '${{ inputs.api-key }}' '${{ steps.create-course.outputs.course_custom_id }}'

    - name: Create deployment summary
      if: success()
      shell: bash
      run: |
        cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        # 🎉 Course Deployment Successful
        
        Your course has been successfully deployed to qBraid!
        
        **Course Name:** ${{ steps.validate-course.outputs.course_name }}
        **qBook URL:** ${{ steps.poll-status.outputs.qbook_url }}
        
        ## Next Steps
        
        You can now access your course at the qBook URL above.
        
        EOF

    - name: Send notification comment
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🎓 **Course Deployment Complete!**\n\nYour course is now live on qBraid.\n\n**View your course:** ${{ steps.poll-status.outputs.qbook_url }}\n\nCourse name: \`${{ steps.validate-course.outputs.course_name }}\``
            });
          } catch (error) {
            if (error.status === 403) {
              core.warning('Could not create commit comment due to missing permissions. Please ensure the workflow has "contents: write" permission or "Read and write permissions" are enabled in repository settings.');
            } else {
              core.warning(`Failed to send notification: ${error.message}`);
            }
          }
